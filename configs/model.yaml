# Configuração de arquitetura do modelo híbrido (embeddings + MLP)
# Consumida por build_model_config() em src/recommender/pipeline/common.py.
# As dimensões de embedding e a arquitetura da MLP vêm daqui; a
# cardinalidade do vocabulário (num_users/num_products) é descoberta
# automaticamente a partir de models/vocab_sizes.json, gerado pelo
# estágio feature_eng do DVC.

model_type: hybrid_mlp

embedding:
  user_embedding_dim: 32
  product_embedding_dim: 32

mlp:
  hidden_dims: [128, 64, 32]
  dropout: 0.3
  use_batchnorm: true
