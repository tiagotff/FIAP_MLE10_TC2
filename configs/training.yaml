# Hiperparâmetros de treino
# Consumido por load_training_config() em train.py, a partir da Etapa 3.
#
# batch_size alto reduz drasticamente o número de iterações por época
# em CPU (dataset tem ~26M linhas de treino): com batch_size=512 seriam
# ~50.600 batches/época; com 131072 são só ~200 — bem mais rápido, já
# que o modelo é pequeno (embeddings de 32 dims + MLP raso) e o gargalo
# real é overhead de iteração em Python, não capacidade de cômputo.
# max_epochs alto (30) serve só como teto de segurança: na prática o
# AUC de validação estabiliza cedo, e early_stopping_patience=3 exige
# uma melhora mínima de AUC para resetar a paciência — evita que o
# treino continue rodando indefinidamente por causa de ruído estatístico
# entre épocas.

learning_rate: 0.001
batch_size: 131072
max_epochs: 30
early_stopping_patience: 3
random_seed: 42
metrics:
  - auc_roc
  - recall
  - precision
  - f1
